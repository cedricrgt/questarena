name: Deploy to o2switch

on:
  push:
    branches:
      - main
      - feat/deploy

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Manage SSH Whitelist for Backend
        run: |
          chmod +x ./scripts/manage-whitelist.sh
          ./scripts/manage-whitelist.sh "${{ secrets.SSH_HOST }}" "${{ secrets.CPANEL_USERNAME }}" "${{ secrets.CPANEL_API_TOKEN }}"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Build NestJS
        run: npm run build
        working-directory: backend

      - name: Create .env for production
        run: |
          echo "POSTGRES_URL=${{ secrets.POSTGRES_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        working-directory: backend

      - name: Compress backend files
        run: |
          cp -r node_modules/.prisma prisma_generated_prisma
          tar -czf backend.tar.gz dist package.json package-lock.json prisma app.js .env prisma_generated_prisma
        working-directory: backend

      - name: Copy backend archive to o2switch
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "backend/backend.tar.gz"
          target: ${{ secrets.BACKEND_DEPLOY_PATH }}
          strip_components: 1

      - name: Extract and install backend
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            source ${{ secrets.NODEVENV_BACKEND_PATH }}/bin/activate
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            tar -xzf backend.tar.gz
            rm backend.tar.gz
            npm install --production --ignore-scripts
            rm -rf ${{ secrets.NODEVENV_BACKEND_PATH }}/lib/node_modules/.prisma
            cp -r prisma_generated_prisma ${{ secrets.NODEVENV_BACKEND_PATH }}/lib/node_modules/.prisma
            rm -rf prisma_generated_prisma
            npx prisma migrate deploy
            mkdir -p tmp
            touch tmp/restart.txt

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Manage SSH Whitelist for Frontend
        run: |
          chmod +x ./scripts/manage-whitelist.sh
          ./scripts/manage-whitelist.sh "${{ secrets.SSH_HOST }}" "${{ secrets.CPANEL_USERNAME }}" "${{ secrets.CPANEL_API_TOKEN }}"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build Next.js
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_RAWG_API_KEY: ${{ secrets.NEXT_PUBLIC_RAWG_API_KEY }}

      - name: Create .env for production
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_PUBLIC_RAWG_API_KEY=${{ secrets.NEXT_PUBLIC_RAWG_API_KEY }}" >> .env
        working-directory: frontend

      - name: Compress frontend files
        run: |
          tar -czf frontend.tar.gz .next package.json package-lock.json public .env next.config.js app.js
        working-directory: frontend

      - name: Copy frontend archive to o2switch
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          source: "frontend/frontend.tar.gz"
          target: ${{ secrets.FRONTEND_DEPLOY_PATH }}
          strip_components: 1

      - name: Extract and install frontend
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            source ${{ secrets.NODEVENV_FRONTEND_PATH }}/bin/activate
            cd ${{ secrets.FRONTEND_DEPLOY_PATH }}
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
