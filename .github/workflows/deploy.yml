name: Deploy to o2switch

on:
  push:
    branches:
      - main
      - feat/deploy

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Whitelist Runner IP on o2switch
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Whitelisting IP: $RUNNER_IP"
          curl -k -H "Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.SSH_HOST }}:2083/execute/SshWhitelist/add?ip=$RUNNER_IP&port=22"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Build NestJS
        run: npm run build
        working-directory: backend

      - name: Create .env for production
        run: |
          echo "POSTGRES_URL=${{ secrets.POSTGRES_URL }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          # Add other necessary env vars here
        working-directory: backend

      - name: Copy files to o2switch via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/dist,backend/package.json,backend/package-lock.json,backend/prisma,backend/app.js,backend/.env"
          target: ${{ secrets.BACKEND_DEPLOY_PATH }}
          strip_components: 1

      - name: Post-deployment commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.BACKEND_DEPLOY_PATH }}
            npm install --production
            npx prisma migrate deploy
            mkdir -p tmp
            touch tmp/restart.txt

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Whitelist Runner IP on o2switch
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "Whitelisting IP: $RUNNER_IP"
          curl -k -H "Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://${{ secrets.SSH_HOST }}:2083/execute/SshWhitelist/add?ip=$RUNNER_IP&port=22"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_RAWG_API_KEY: ${{ secrets.NEXT_PUBLIC_RAWG_API_KEY }}

      - name: Create .env for production
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_PUBLIC_RAWG_API_KEY=${{ secrets.NEXT_PUBLIC_RAWG_API_KEY }}" >> .env
        working-directory: frontend

      - name: Copy Next.js app to o2switch via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/.next,frontend/package.json,frontend/package-lock.json,frontend/public,frontend/.env,frontend/next.config.ts"
          target: ${{ secrets.FRONTEND_DEPLOY_PATH }}
          strip_components: 1

      - name: Post-deployment commands for frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.FRONTEND_DEPLOY_PATH }}
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
